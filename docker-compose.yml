services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eventapp
      POSTGRES_PASSWORD: eventapp
      POSTGRES_DB: eventbooking
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventapp -d eventbooking"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://eventapp:eventapp@db:5432/eventbooking?sslmode=disable
      PORT: "8080"
      MIGRATIONS_DIR: /app/migrations
      LOG_OUTPUT: /var/log/event-booking.log
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
